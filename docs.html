<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentación — Calculadora Fiscal CR 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a2e; --ink2:#2d2d4e; --ink3:#4a4a6a;
  --muted:#8888aa; --soft:#c4c4d8; --line:#e8e8f0;
  --bg:#f5f4f0; --surface:#fff;
  --emerald:#00c896; --emerald-mid:#00a07a;
  --cobalt:#3b5bdb;
  --shadow:0 1px 3px rgba(26,26,46,.06),0 4px 16px rgba(26,26,46,.06);
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* Header */
.docs-header{background:var(--ink);color:#fff;padding:20px 0;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.docs-header-inner{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.docs-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
.docs-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;text-decoration:none;font-size:13px;font-weight:500;transition:all .2s}
.docs-back:hover{background:rgba(0,200,150,.2);border-color:var(--emerald);transform:translateY(-1px)}

/* Loading */
.docs-loading{max-width:1100px;margin:60px auto;padding:0 16px;text-align:center}
.spinner{display:inline-block;width:40px;height:40px;border:4px solid var(--line);border-top-color:var(--emerald);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;color:var(--muted);font-size:14px}

/* Content */
.docs-content{max-width:1100px;margin:40px auto 80px;padding:0 16px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.readme-wrapper{padding:40px}

/* GitHub Markdown Styles */
.readme-wrapper h1{font-size:32px;font-weight:700;margin:0 0 20px;padding-bottom:12px;border-bottom:2px solid var(--line);color:var(--ink)}
.readme-wrapper h2{font-size:24px;font-weight:600;margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--line);color:var(--ink)}
.readme-wrapper h3{font-size:20px;font-weight:600;margin:24px 0 12px;color:var(--ink)}
.readme-wrapper h4{font-size:16px;font-weight:600;margin:20px 0 10px;color:var(--ink2)}
.readme-wrapper p{margin:12px 0;line-height:1.7;color:var(--ink3)}
.readme-wrapper a{color:var(--cobalt);text-decoration:none;font-weight:500}
.readme-wrapper a:hover{text-decoration:underline}
.readme-wrapper ul,.readme-wrapper ol{margin:12px 0;padding-left:28px}
.readme-wrapper li{margin:6px 0;line-height:1.7;color:var(--ink3)}
.readme-wrapper code{background:var(--bg);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--emerald-mid)}
.readme-wrapper pre{background:var(--ink);color:#fff;padding:16px;border-radius:8px;overflow-x:auto;margin:16px 0}
.readme-wrapper pre code{background:transparent;padding:0;color:#fff}
.readme-wrapper table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.readme-wrapper table th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:600;border:1px solid var(--line)}
.readme-wrapper table td{padding:10px 12px;border:1px solid var(--line)}
.readme-wrapper blockquote{border-left:4px solid var(--emerald);padding:12px 16px;margin:16px 0;background:var(--bg);color:var(--ink3)}
.readme-wrapper img{max-width:100%;height:auto;border-radius:8px;margin:16px 0}
.readme-wrapper hr{border:none;border-top:2px solid var(--line);margin:32px 0}
.readme-wrapper strong{font-weight:600;color:var(--ink)}
.readme-wrapper em{font-style:italic;color:var(--ink2)}

/* Error */
.docs-error{max-width:1100px;margin:60px auto;padding:40px 16px;text-align:center}
.error-icon{font-size:48px;margin-bottom:16px}
.error-title{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px}
.error-message{color:var(--muted);margin-bottom:20px}
.error-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--emerald);color:#fff;text-decoration:none;border-radius:8px;font-weight:500;transition:all .2s}
.error-link:hover{background:var(--emerald-mid);transform:translateY(-1px)}

/* Responsive */
@media(max-width:768px){
  .readme-wrapper{padding:24px 20px}
  .readme-wrapper h1{font-size:26px}
  .readme-wrapper h2{font-size:20px}
  .readme-wrapper h3{font-size:18px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="docs-header">
  <div class="docs-header-inner">
    <div class="docs-title">
      <span>📚</span>
      Documentación Completa
    </div>
    <a href="index.html" class="docs-back">
      <span>←</span>
      Volver a la calculadora
    </a>
  </div>
</div>

<!-- Loading -->
<div class="docs-loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Cargando documentación desde GitHub...</div>
</div>

<!-- Content -->
<div class="docs-content" id="content-wrapper" style="display:none">
  <div class="readme-wrapper" id="content"></div>
</div>

<!-- Error -->
<div class="docs-error" id="error" style="display:none">
  <div class="error-icon">⚠️</div>
  <div class="error-title">No se pudo cargar la documentación</div>
  <div class="error-message">Hubo un problema al conectar con GitHub. Por favor, intenta de nuevo más tarde.</div>
  <a href="https://github.com/fabian7593/CRTaxes2026/blob/main/README.md" target="_blank" rel="noopener noreferrer" class="error-link">
    Ver en GitHub
    <span>↗</span>
  </a>
</div>

<script>
// Cargar README desde GitHub API
async function loadReadme() {
  try {
    const response = await fetch('https://api.github.com/repos/fabian7593/CRTaxes2026/readme', {
      headers: {
        'Accept': 'application/vnd.github.v3.html'
      }
    });

    if (!response.ok) {
      throw new Error('GitHub API error: ' + response.status);
    }

    const html = await response.text();
    
    // Ocultar loading, mostrar contenido
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content-wrapper').style.display = 'block';
    document.getElementById('content').innerHTML = html;

    // Hacer que los links externos se abran en nueva pestaña
    document.querySelectorAll('#content a').forEach(link => {
      if (link.hostname !== window.location.hostname) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });

    console.log('✓ README cargado exitosamente desde GitHub');
  } catch (error) {
    console.error('Error al cargar README:', error);
    
    // Mostrar error
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

// Cargar al iniciar
loadReadme();
</script>

</body>
</html>
